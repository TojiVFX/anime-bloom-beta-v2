<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — AnimeBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0d13;
    --card: #13141e;
    --surface: #1a1c28;
    --red: #ff3b3b;
    --red-glow: rgba(255,59,59,0.18);
    --red-border: rgba(255,59,59,0.3);
    --text: #e2e4f0;
    --muted: #5a5d78;
    --border: rgba(255,255,255,0.07);
    --input-bg: #0f101a;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,59,59,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,59,59,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Radial glow behind card */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse at center, rgba(255,59,59,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 400px;
    padding: 40px 36px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,59,59,0.6), transparent);
    border-radius: 1px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    background: var(--red-glow);
    border: 1px solid var(--red-border);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }

  .logo-icon svg { width: 24px; height: 24px; color: var(--red); }

  .logo-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, #ff3b3b, #ff7040);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .form { display: flex; flex-direction: column; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 7px; }

  .field label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .input-wrap { position: relative; }

  .input-wrap svg {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.15s;
  }

  .toggle-pw {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    display: flex; padding: 2px;
    border-radius: 4px; transition: color 0.15s;
  }
  .toggle-pw:hover { color: var(--text); }
  .toggle-pw svg { width: 15px; height: 15px; }

  input[type="password"], input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    padding: 12px 42px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }

  input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,59,59,0.1);
  }

  .input-wrap:focus-within svg:first-child { color: var(--red); }

  .btn-login {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.3px;
  }

  .btn-login:hover { background: #e02828; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { background: #3a1010; color: #6a3333; cursor: not-allowed; transform: none; }

  .btn-login svg { width: 16px; height: 16px; }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error message */
  .error-box {
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.25);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: #ff7070;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error-box.show { display: flex; }
  .error-box svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Success state */
  .success-box {
    background: rgba(34,224,122,0.08);
    border: 1px solid rgba(34,224,122,0.25);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: #22e07a;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .success-box.show { display: flex; }
  .success-box svg { width: 14px; height: 14px; flex-shrink: 0; }

  .lock-notice {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 6px;
  }
  .lock-notice svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* Shake animation on wrong password */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="logo-name">AnimeBloom</div>
    <div class="logo-sub">Admin Access</div>
  </div>

  <div class="form">
    <div class="error-box" id="error-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-msg">Incorrect password</span>
    </div>

    <div class="success-box" id="success-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20,6 9,17 4,12"/>
      </svg>
      Authenticated! Redirecting to admin panel...
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" autofocus>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="toggle-pw-btn" title="Show/hide password">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span id="btn-text">Sign In</span>
    </button>

    <div class="lock-notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Protected by server-side authentication
    </div>
  </div>
</div>

<script>
  // Get ?next= param to redirect after login
  const params = new URLSearchParams(window.location.search);
  const nextPage = params.get('next') || '/admin';

  async function doLogin() {
    const password = document.getElementById('password').value.trim();
    if (!password) {
      showError('Please enter your password');
      return;
    }

    // Loading state
    setLoading(true);
    hideError();

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Show success
        document.getElementById('success-box').classList.add('show');
        document.getElementById('error-box').classList.remove('show');
        setTimeout(() => { window.location.href = nextPage; }, 1000);
      } else {
        setLoading(false);
        showError(data.error || 'Incorrect password');
        document.getElementById('card').classList.add('shake');
        setTimeout(() => document.getElementById('card').classList.remove('shake'), 500);
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      setLoading(false);
      showError('Connection error — try again');
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-icon').style.display = on ? 'none' : 'block';
    document.getElementById('btn-text').textContent = on ? 'Signing in...' : 'Sign In';
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-box').classList.add('show');
  }

  function hideError() {
    document.getElementById('error-box').classList.remove('show');
  }

  let pwVisible = false;
  function togglePw() {
    pwVisible = !pwVisible;
    const input = document.getElementById('password');
    input.type = pwVisible ? 'text' : 'password';
    document.getElementById('eye-icon').innerHTML = pwVisible
      ? `<line x1="1" y1="1" x2="23" y2="23"/><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  // Allow Enter key
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
